# Production Nginx Reverse Proxy Config for MaithilCart
# Place this file in /etc/nginx/sites-available/maithilcart on your Linux server

server {
    listen 80;
    server_name maithilcart.com seller.maithilcart.com admin.maithilcart.com;

    # Redirect HTTP to HTTPS (uncomment after installing SSL certificates)
    # return 301 https://$host$request_uri;

    location / {
        # Proxy all traffic (HTML/JS and /api requests) to the frontend Docker container
        proxy_pass http://127.0.0.1:5173;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable WebSocket proxying for dev updates (if testing dev builds)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
