# Production Nginx Reverse Proxy Config for Maithil Cart
# Place this file in /etc/nginx/sites-available/maithilcart on your Linux server

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name maithilcart.com seller.maithilcart.com admin.maithilcart.com;

    # Return 301 redirect to HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS Server Block (Production Secure TLS)
server {
    listen 443 ssl;
    server_name maithilcart.com seller.maithilcart.com admin.maithilcart.com;

    # SSL Certificate Config (Certbot paths)
    # ssl_certificate /etc/letsencrypt/live/maithilcart.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/maithilcart.com/privkey.pem;

    # Modern TLS Security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Gzip Compression configurations
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    location / {
        # Proxy all traffic to the frontend container
        proxy_pass http://127.0.0.1:5173;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
