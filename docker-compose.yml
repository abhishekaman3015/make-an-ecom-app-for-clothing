services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maithilcart
      POSTGRES_PASSWORD: maithilcart
      POSTGRES_DB: maithilcart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maithilcart -d maithilcart"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://maithilcart:maithilcart@postgres:5432/maithilcart?sslmode=disable
      JWT_SECRET: replace-with-a-long-random-secret
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
      PAYMENT_PROVIDER: mock
    ports:
      - "8080:8080"

  frontend:
    build: ./client
    depends_on:
      - api
    environment:
      VITE_PROXY_TARGET: http://api:8080
    ports:
      - "5173:5173"

volumes:
  pgdata:
